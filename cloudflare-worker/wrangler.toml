[vars]
API_BASE_URL = "https://your-api-domain.com"

# These should be set as secrets using wrangler secret put
# STRAVA_CLIENT_ID
# STRAVA_CLIENT_SECRET  
# STRAVA_WEBHOOK_VERIFY_TOKEN
